<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | RESIDIA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../styles/login.css">
</head>

<body>

  <main class="auth-page">

    <!-- LEFT VISUAL -->
    <section class="auth-visual">

      <img src="../src/login-bg.jpg" alt="RESIDIA login visual">

      <div class="visual-overlay"></div>

      <div class="visual-content">

        <a href="../index.html" class="back-btn">
          ← Back Home
        </a>

        <div class="visual-bottom">
          <p class="visual-label">
            RESIDIA ACCESS
          </p>

          <h1>
            Welcome<br>
            Back
          </h1>

          <span>
            Sign in to continue your journey toward refined living and curated residences.
          </span>
        </div>

      </div>

    </section>

    <!-- RIGHT PANEL -->
    <section class="auth-panel">

      <div class="auth-card">

        <div class="brand-mini">
          <img src="../src/logo.png" alt="RESIDIA Logo">
          <span>RESIDIA</span>
        </div>

        <p class="small-label">
          WELCOME BACK
        </p>

        <h2>
          Masuk Akun
        </h2>

        <p class="subtitle">
          Pilih tipe akun dan masuk untuk melanjutkan akses ke RESIDIA.
        </p>

        <div class="role-tabs">
          <button class="active" data-role="user">User</button>
          <button data-role="mitra">Mitra</button>
          <button data-role="admin">Admin</button>
        </div>

        <form id="loginForm">

          <input type="hidden" id="selectedRole" value="user">

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@email.com">
            <small></small>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            <small></small>
          </div>

          <div class="form-options">

            <label class="remember-check">
              <input type="checkbox">
              <span>Remember me</span>
            </label>

            <a href="forgot-password.html">
              Forgot password?
            </a>

          </div>

          <button type="submit" class="login-btn">
            Masuk sebagai <span id="roleText">User</span>
          </button>

        </form>

        <div class="auth-divider">
          <span></span>
          <p>New to RESIDIA?</p>
          <span></span>
        </div>

        <p class="register-text">
          Belum punya akun?
          <a href="sign-up.html">Create an account</a>
        </p>

      </div>

    </section>

  </main>

  <script src="../script/login.js"></script>

</body>
</html>
